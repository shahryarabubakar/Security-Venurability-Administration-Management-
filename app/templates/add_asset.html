{% extends "base.html" %}
{% block title %}Add Asset{% endblock %}
{% block content %}
<div class="page-header">
    <div><h1 class="page-title">Add Asset</h1><p class="page-subtitle">Register a new asset</p></div>
    <a href="{{ url_for('list_assets') }}" class="btn btn-outline">← Back</a>
</div>
<div class="form-card">
    <form method="POST" action="{{ url_for('add_asset') }}">
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Asset Name <span class="required">*</span></label>
                <input class="form-input" type="text" name="asset_name" placeholder="e.g. Web Server 01" required>
            </div>
            <div class="form-group">
                <label class="form-label">IP Address <span class="required">*</span></label>
                <input class="form-input mono" type="text" name="ip_address" placeholder="192.168.1.10" required>
            </div>
            <div class="form-group">
                <label class="form-label">Operating System</label>
                <input class="form-input" type="text" name="operating_system" placeholder="e.g. Ubuntu 22.04">
            </div>
            <div class="form-group">
                <label class="form-label">Asset Type</label>
                <select class="form-select" name="asset_type">
                    {% for t in ['Server','Workstation','Database','Network Device','Web Application','Other'] %}
                    <option value="{{ t }}">{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Owner</label>
                <select class="form-select" name="owner_id">
                    <option value="">Unassigned</option>
                    {% for u in users %}
                    <option value="{{ u[0] }}">{{ u[1] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Status</label>
                <select class="form-select" name="status">
                    {% for s in ['Active','Inactive','Decommissioned'] %}
                    <option value="{{ s }}">{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group form-full">
                <label class="form-label">Tags</label>
                <div class="tag-checkboxes">
                    {% for t in all_tags %}
                    <label class="tag-checkbox-label">
                        <input type="checkbox" name="tag_ids" value="{{ t[0] }}">
                        <span class="tag-pill" style="background:{{ t[2] }}22;color:{{ t[2] }};border-color:{{ t[2] }}44">{{ t[1] }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('list_assets') }}" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-primary">Add Asset</button>
        </div>
    </form>
</div>
{% endblock %}
